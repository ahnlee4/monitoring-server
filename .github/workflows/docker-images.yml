name: Build Docker Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-images.yml"
      - "backend/**"
      - "collector/**"
      - "frontend/**"
      - "docker-compose.board.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            context: ./backend
            image: ghcr.io/ahnlee4/monitoring-backend
          - name: collector
            context: ./collector
            image: ghcr.io/ahnlee4/monitoring-collector
          - name: frontend
            context: ./frontend
            image: ghcr.io/ahnlee4/monitoring-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ matrix.service.image }}:latest
            ${{ matrix.service.image }}:${{ github.sha }}
